<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corporate RAG Platform</title>
    <style>
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            max-width: 900px;
            width: 100%;
            height: 90vh;
            margin: 20px;
            background-color: #1e293b;
            border-radius: 12px;
            border: 1px solid #334155;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }
        header {
            padding: 20px 24px;
            background-color: #1e293b;
            border-bottom: 1px solid #334155;
        }
        h1 { 
            color: #2dd4bf; 
            margin: 0; 
            font-size: 22px; 
            font-weight: 600;
            letter-spacing: -0.025em;
        }
        p { 
            color: #94a3b8; 
            margin: 6px 0 0 0; 
            font-size: 13px; 
        }
        #chat-box {
            flex: 1;
            overflow-y: auto;
            background-color: #0f172a;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        /* Kustomisasi Scrollbar */
        #chat-box::-webkit-scrollbar {
            width: 6px;
        }
        #chat-box::-webkit-scrollbar-track {
            background: #0f172a;
        }
        #chat-box::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 3px;
        }
        .msg { 
            padding: 12px 16px; 
            max-width: 75%; 
            font-size: 14px; 
            line-height: 1.6; 
            border-radius: 8px; 
            animation: fadeIn 0.2s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .user { 
            background-color: #0f766e; 
            align-self: flex-end; 
            color: #f8fafc; 
            border-bottom-right-radius: 2px;
        }
        .bot { 
            background-color: #1e293b; 
            border: 1px solid #334155; 
            align-self: flex-start; 
            border-bottom-left-radius: 2px;
        }
        .sources { 
            font-size: 12px; 
            color: #94a3b8; 
            border-top: 1px solid #334155; 
            margin-top: 12px; 
            padding-top: 8px; 
        }
        .source-title { 
            color: #2dd4bf; 
            font-weight: 500; 
            display: block;
            margin-bottom: 4px;
        }
        .source-item {
            display: block;
            margin-top: 2px;
            color: #cbd5e1;
        }
        #loading { 
            color: #2dd4bf; 
            font-size: 13px; 
            padding: 0 24px 12px 24px;
            background-color: #0f172a;
            font-style: italic; 
            display: none; 
        }
        .input-area { 
            display: flex; 
            flex-direction: column;
            gap: 12px; 
            padding: 16px 24px;
            background-color: #1e293b;
            border-top: 1px solid #334155;
        }
        .control-panel {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .control-panel label {
            font-size: 13px;
            color: #94a3b8;
        }
        select {
            background-color: #0f172a;
            color: #f8fafc;
            border: 1px solid #334155;
            border-radius: 6px;
            padding: 6px 12px;
            font-size: 13px;
            cursor: pointer;
            outline: none;
            transition: border-color 0.15s ease;
        }
        select:focus {
            border-color: #2dd4bf;
        }
        .interactive-form {
            display: flex;
            gap: 12px;
            width: 100%;
        }
        input {
            flex: 1;
            background-color: #0f172a;
            border: 1px solid #334155;
            border-radius: 6px;
            padding: 12px 16px;
            color: #f8fafc;
            font-size: 14px;
            transition: border-color 0.15s ease;
        }
        input:focus { 
            outline: none;
            border-color: #2dd4bf; 
        }
        button {
            background-color: #0d9488;
            color: #f8fafc;
            border: none;
            padding: 0 24px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            font-size: 14px;
            transition: background-color 0.15s ease;
        }
        button:hover { 
            background-color: #14b8a6; 
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Corporate Retrieval-Augmented Generation</h1>
        <p>Sistem pencarian berbasis dokumen lokal dan model bahasa komputasi internal</p>
    </header>

    <div id="chat-box"></div>
    
    <div id="loading">Memproses dokumen dan menyusun jawaban melalui infrastruktur lokal...</div>

    <div class="input-area">
        <div class="control-panel">
            <label for="mode-select">Basis Pengetahuan:</label>
            <select id="mode-select">
                <option value="rag">Dokumen Lokal (Qdrant)</option>
                <option value="general">Pengetahuan Umum (Phi-3 Mini Bawaan)</option>
            </select>
        </div>
        <div class="interactive-form">
            <input type="text" id="query-input" placeholder="Masukkan kata kunci atau pertanyaan analisis di sini..." onkeypress="handleKeyPress(event)">
            <button onclick="kirimPertanyaan()">Kirim</button>
        </div>
    </div>
</div>

<script>
    async function kirimPertanyaan() {
        const inputField = document.getElementById('query-input');
        const chatBox = document.getElementById('chat-box');
        const loadingText = document.getElementById('loading');
        const modeSelect = document.getElementById('mode-select');
        
        const question = inputField.value.trim();
        const selectedMode = modeSelect.value;

        if (!question) return;

        chatBox.innerHTML += `<div class="msg user">${question}</div>`;
        inputField.value = '';
        chatBox.scrollTop = chatBox.scrollHeight;

        loadingText.style.display = 'block';

        try {
            const response = await fetch('http://localhost:8000/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    question: question,
                    mode: selectedMode
                })
            });
            const data = await response.json();

            let sourcesHTML = '';
            if (selectedMode === 'rag' && data.sources && data.sources.length > 0) {
                sourcesHTML += `<div class="sources"><span class="source-title">Referensi Dokumen:</span>`;
                data.sources.forEach(src => {
                    const fileName = src.file.replace(/^.*[\\/]/, '');
                    sourcesHTML += `<span class="source-item">Berkas: ${fileName} (Halaman ${src.page})</span>`;
                });
                sourcesHTML += `</div>`;
            }

            chatBox.innerHTML += `
                <div class="msg bot">
                    <div>${data.answer}</div>
                    ${sourcesHTML}
                </div>
            `;

        } catch (error) {
            chatBox.innerHTML += `<div class="msg bot" style="color: #f87171;">Gagal terhubung dengan layanan backend. Pastikan server API lokal Anda telah aktif.</div>`;
        } finally {
            loadingText.style.display = 'none';
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    }

    function handleKeyPress(event) {
        if (event.key === 'Enter') {
            kirimPertanyaan();
        }
    }
</script>

</body>
</html>
